name: Daily Stock Data Update

on:
  schedule:
    - cron: '0 9 * * 1-5'   # UTC 09:00 = KST 18:00 (장 마감 후 full refresh)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python deps
        run: pip install -r scripts/requirements.txt

      - name: Determine trade date
        id: trading
        run: |
          cd scripts
          python holiday_exit_guard.py

      - name: Fetch stocks
        run: |
          cd scripts
          python fetch_stocks.py

      - name: Calculate indicators
        run: |
          cd scripts
          python calculate_indicators.py

      - name: Fetch sectors
        run: |
          cd scripts
          python fetch_sectors.py

      - name: Calculate pattern stats
        run: |
          cd scripts
          python calculate_pattern_stats.py

      - name: Fetch fundamentals
        env:
          REFRESH_TYPE: full
        run: |
          cd scripts
          python fetch_fundamentals.py

      - name: Split OHLCV per stock
        run: |
          cd scripts
          python split_ohlcv.py

      - name: Push to data branch (orphan commit)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan data-tmp
          git reset --hard
          git checkout ${{ github.sha }} -- public/data/
          git add public/data/
          git commit -m "data: $(date -u +%Y-%m-%d) KST $(TZ=Asia/Seoul date +%H:%M)"
          git push -f origin data-tmp:data

      - name: Trigger Vercel deploy
        run: |
          if [ -n "${{ secrets.VERCEL_DEPLOY_HOOK }}" ]; then
            curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
            echo "✅ Vercel deploy triggered"
          else
            echo "⚠️ VERCEL_DEPLOY_HOOK not set — skipping redeploy"
          fi

      - name: Summary
        run: |
          echo "Data update completed successfully"
