name: Light Data Update (fundamentals only)

on:
  schedule:
    - cron: '0 0,2,4,6,8 * * 1-5'   # UTC 00:00, 02:00, 04:00, 06:00, 08:00 = KST 09:00, 11:00, 13:00, 15:00, 17:00
  workflow_dispatch:

jobs:
  light:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python deps
        run: pip install -r scripts/requirements.txt

      - name: Pull existing data branch files
        run: |
          git fetch origin data --depth=1
          # data 브랜치의 모든 파일을 working tree에 복원
          git checkout origin/data -- public/data/
          echo "✓ Pulled existing data branch"
          ls public/data/ | head -10

      - name: Determine trade date
        run: |
          cd scripts
          python holiday_exit_guard.py

      - name: Fetch fundamentals (light)
        env:
          REFRESH_TYPE: light
        run: |
          cd scripts
          python fetch_fundamentals.py

      - name: Push to data branch (orphan commit with existing + new fundamentals)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # orphan branch 생성 (working tree는 그대로 유지됨)
          git checkout --orphan data-tmp
          # index 비우기 (main에서 넘어온 것 포함)
          git reset
          # public/data/ + vercel.json 모두 stage
          # vercel.json은 data 브랜치 Preview 배포 차단을 위해 반드시 포함해야 함
          git add -f public/data/ vercel.json
          git commit -m "data(light): $(date -u +%Y-%m-%d) KST $(TZ=Asia/Seoul date +%H:%M)"
          git push -f origin data-tmp:data

      - name: Trigger Vercel deploy
        run: |
          if [ -n "${{ secrets.VERCEL_DEPLOY_HOOK }}" ]; then
            curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
            echo "✅ Vercel deploy triggered (light refresh)"
          else
            echo "⚠️ VERCEL_DEPLOY_HOOK not set"
          fi

      - name: Summary
        run: |
          echo "Light refresh completed at $(TZ=Asia/Seoul date +%H:%M) KST"
